<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Essay — The Idea Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="essay-page-background">
  <nav id="navbar">
    <a href="index.html" class="nav-logo" aria-label="The Idea Vault">
      <svg width="220" height="60" viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
        <style>
          .title { font-family: 'Georgia', serif; font-size: 20px; fill: #d1ff4a; font-weight: 600; }
          .sub { font-family: 'Arial', sans-serif; font-size: 10px; fill: #9aa3a8; letter-spacing: 2px; }
          .icon { stroke: #d1ff4a; stroke-width: 1.5; fill: none; }
        </style>
        <circle cx="20" cy="30" r="10" class="icon"/>
        <circle cx="15" cy="25" r="1.5" fill="#d1ff4a"/>
        <circle cx="25" cy="25" r="1.5" fill="#d1ff4a"/>
        <circle cx="20" cy="35" r="1.5" fill="#d1ff4a"/>
        <line x1="15" y1="25" x2="25" y2="25" class="icon"/>
        <line x1="20" y1="35" x2="15" y2="25" class="icon"/>
        <line x1="20" y1="35" x2="25" y2="25" class="icon"/>
        <text x="40" y="28" class="title">The Idea Vault</text>
        <text x="40" y="45" class="sub">THOUGHT ARCHIVE</text>
      </svg>
    </a>
    <ul class="nav-links">
      <li><a href="index.html#ideas">Ideas</a></li>
      <li><a href="index.html#blog">Essays</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">☀️</button>
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="index.html#ideas" onclick="closeMobileMenu()">Ideas</a></li>
      <li><a href="index.html#blog" onclick="closeMobileMenu()">Essays</a></li>
      <li><a href="index.html#about" onclick="closeMobileMenu()">About</a></li>
      <li><a href="index.html#contact" onclick="closeMobileMenu()">Contact</a></li>
    </ul>
  </div>

  <section id="essayPage" class="essay-page">
    <p class="section-label">Essay</p>
    <h1 class="section-title" id="essayPageTitle"></h1>
    <div class="essay-full-date" id="essayPageDate"></div>
    <img id="essayPageImage" class="essay-full-img" src="" alt="" style="display:none;" />
    <div class="essay-full-body" id="essayPageBody"></div>
    <div class="essay-rating">
      <div class="rating-header">
        <span>Your position</span>
        <span class="rating-value" id="essayPageRatingLabel"></span>
      </div>
      <div class="rating-feedback-label">Rating feedback</div>
      <div class="slider-row">
        <span>Strongly disagree</span>
        <span>Strongly agree</span>
      </div>
      <div class="rating-controls">
        <input id="essayPageRating" class="rating-slider" type="range" min="0" max="10" step="1" value="5" />
        <button id="essayPageRatingSubmit" type="button" class="btn btn-primary btn-small">Submit rating</button>
      </div>
      <input id="essayPageEmail" class="rating-email" type="email" placeholder="Your email for notification (optional)" />
      <div class="rating-submit-message" id="essayPageSubmitMessage"></div>
    </div>
    <div class="related-essays" id="relatedEssaysSection">
      <p class="section-label">You may also like</p>
      <div class="related-essays-grid" id="relatedEssays"></div>
    </div>
    <div id="essayPageNotFound" style="display:none; color: var(--muted); margin-top: 2rem;">Essay not found. <a href="index.html#blog" class="btn btn-ghost">Return to essays</a></div>
  </section>

  <footer>
    <div>The Idea Vault — a personal project</div>
    <div>Built with curiosity &amp; plain HTML</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
